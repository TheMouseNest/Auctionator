name: Build

on:
  push:
    branches:
    - master
    tags:
    - '*'

    paths-ignore:
    - ".github/**"
    - "README.md"
    - ".luarc.json"
    - "annotations.lua"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: BigWigsMods/packager@master
      with:
        args: -p 6124 -a rN4k3xGD
      env:
        CF_API_KEY: ${{ secrets.plusmouse_curseforge }}
        WAGO_API_TOKEN: ${{ secrets.plusmouse_wago }}
